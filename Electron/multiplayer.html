<!DOCTYPE html>
<html>
<head>
    <title>3D AI Game - Multiplayer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: grid;
            width: 100%;
            height: 100vh;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
        }
        
        .quadrant {
            position: relative;
            border: 1px solid #333;
            background-color: #222;
            overflow: hidden;
        }
        
        .quadrant-setup {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            height: 100%;
            box-sizing: border-box;
        }
        
        .quadrant-title {
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .quadrant-content {
            background-color: rgba(40, 40, 40, 0.7);
            border-radius: 10px;
            padding: 15px;
            width: 100%;
            max-width: 300px;
        }
        
        .slot-assignment {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .slot-instructions {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .keyboard-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 15px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        
        .keyboard-btn:hover {
            background-color: #45a049;
        }
        
        .controller-list {
            margin-top: 20px;
            font-size: 14px;
        }
        
        .controller-item {
            background-color: rgba(60, 60, 60, 0.7);
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 5px;
        }
        
        .controller-name {
            font-weight: bold;
        }
        
        .no-controllers {
            text-align: center;
            color: #bbb;
        }
        
        .or-divider {
            margin: 10px 0;
            font-size: 14px;
            color: #ccc;
        }
        
        .client-box {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .player-info {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 5;
        }
        
        .controller-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 5;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="container" id="gameContainer">
        <div class="quadrant" id="quadrant-0"></div>
        <div class="quadrant" id="quadrant-1"></div>
        <div class="quadrant" id="quadrant-2"></div>
        <div class="quadrant" id="quadrant-3"></div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const playerCount = parseInt(urlParams.get('playerCount') || 4);
        const implementation = urlParams.get('implementation') || 'default';
        const serverUrl = urlParams.get('serverUrl') || 'http://localhost:3000';
        const environment = urlParams.get('environment') || 'production';
        
        // Extract server port from URL if needed for local connections
        let serverPort = 3000;
        if (serverUrl.includes('localhost')) {
            const portMatch = serverUrl.match(/:(\d+)/);
            if (portMatch && portMatch[1]) {
                serverPort = parseInt(portMatch[1]);
            }
        }
        
        console.log(`Multiplayer setup: ${playerCount} players, implementation: ${implementation}`);
        console.log(`Environment: ${environment}, Server: ${serverUrl}`);
        
        // Controller colors for player identification
        const CONTROLLER_COLORS = ['#4CAF50', '#2196F3', '#FF9800', '#E91E63'];
        
        // Player assignments storage
        const playerAssignments = Array(playerCount).fill().map(() => ({ 
            assigned: false,
            type: null,
            controllerIndex: null
        }));
        
        // Track controllers and assignments
        const controllerStates = {};
        let gameRunning = false;
        
        // Set title and container class
        document.title = `3D AI Game - ${playerCount} Players - ${implementation}`;
        
        // Initialize the quadrants
        function initializeQuadrants() {
            for (let i = 0; i < playerCount; i++) {
                createQuadrantSetupUI(i);
            }
        }
        
        // Create setup UI for an individual quadrant
        function createQuadrantSetupUI(playerIndex) {
            const position = getPositionName(playerIndex, playerCount);
            const quadrantEl = document.getElementById(`quadrant-${playerIndex}`);
            
            // Create the setup UI
            const setupEl = document.createElement('div');
            setupEl.className = 'quadrant-setup';
            setupEl.innerHTML = `
                <div class="quadrant-title">Player ${playerIndex + 1} (${position})</div>
                <div class="quadrant-content">
                    <div class="slot-assignment" id="slot-assignment-${playerIndex}">
                        <div class="slot-instructions">
                            <button class="keyboard-btn">Use Keyboard/Mouse</button>
                            <div class="or-divider">OR</div>
                            <div>Press a button on your controller</div>
                        </div>
                    </div>
                    <div class="controller-list" id="controller-list-${playerIndex}">
                        <div class="no-controllers">No controllers detected</div>
                    </div>
                </div>
            `;
            
            quadrantEl.appendChild(setupEl);
            
            // Add event listener for keyboard assignment
            setupEl.querySelector('.keyboard-btn').addEventListener('click', () => {
                assignKeyboardToPlayer(playerIndex);
            });
            
            // Update the controller list for this quadrant
            updateQuadrantControllerList(playerIndex);
        }
        
        // Update the controller list UI for a specific quadrant
        function updateQuadrantControllerList(playerIndex) {
            const controllerListEl = document.getElementById(`controller-list-${playerIndex}`);
            if (!controllerListEl) return;
            
            const connectedGamepads = Object.values(controllerStates).filter(c => !c.assigned);
            
            if (connectedGamepads.length === 0) {
                controllerListEl.innerHTML = '<div class="no-controllers">No available controllers</div>';
                return;
            }
            
            controllerListEl.innerHTML = '';
            connectedGamepads.forEach((controller, index) => {
                const controllerEl = document.createElement('div');
                controllerEl.className = 'controller-item';
                controllerEl.innerHTML = `
                    <div class="controller-name">
                        ${controller.id.substring(0, 20)}${controller.id.length > 20 ? '...' : ''}
                    </div>
                    <div class="controller-status">Ready</div>
                `;
                controllerListEl.appendChild(controllerEl);
            });
        }
        
        // Update all controller lists
        function updateAllControllerLists() {
            // Update the controller list for each unassigned player
            for (let i = 0; i < playerCount; i++) {
                if (!playerAssignments[i].assigned) {
                    updateQuadrantControllerList(i);
                }
            }
        }
        
        // Setup gamepad detection
        function setupGamepadDetection() {
            // Initialize controller states
            window.addEventListener('gamepadconnected', (e) => {
                console.log(`Gamepad connected: ${e.gamepad.id}`);
                controllerStates[e.gamepad.index] = {
                    id: e.gamepad.id,
                    timestamp: e.gamepad.timestamp,
                    assigned: false
                };
                
                // Update all controller lists
                updateAllControllerLists();
            });
            
            window.addEventListener('gamepaddisconnected', (e) => {
                console.log(`Gamepad disconnected: ${e.gamepad.id}`);
                if (controllerStates[e.gamepad.index]) {
                    // Handle controller disconnect - maybe reassign player
                    const playerIndex = playerAssignments.findIndex(a => 
                        a.type === 'gamepad' && a.controllerIndex === e.gamepad.index);
                    
                    if (playerIndex !== -1) {
                        removeAssignment(playerIndex);
                    }
                    
                    delete controllerStates[e.gamepad.index];
                    
                    // Update all controller lists
                    updateAllControllerLists();
                }
            });
            
            // Poll for button presses
            const pollGamepads = () => {
                const gamepads = navigator.getGamepads();
                for (let i = 0; i < gamepads.length; i++) {
                    const gamepad = gamepads[i];
                    if (!gamepad) continue;
                    
                    // If controller exists and has buttons pressed
                    if (controllerStates[gamepad.index] && !controllerStates[gamepad.index].assigned) {
                        const anyButtonPressed = gamepad.buttons.some(button => button.pressed);
                        if (anyButtonPressed) {
                            assignGamepadToNextSlot(gamepad.index);
                        }
                    }
                }
                requestAnimationFrame(pollGamepads);
            };
            
            // Start polling
            pollGamepads();
        }
        
        // Assign keyboard/mouse to a player
        function assignKeyboardToPlayer(playerIndex) {
            if (playerAssignments[playerIndex].assigned) {
                return; // Already assigned
            }
            
            playerAssignments[playerIndex] = {
                assigned: true,
                type: 'keyboard',
                playerIndex
            };
            
            // Create the game window for this player
            createGameWindowForPlayer(playerIndex);
            
            // Update controller lists for remaining quadrants
            updateAllControllerLists();
        }
        
        // Remove an assignment from a player slot
        function removeAssignment(playerIndex) {
            const assignment = playerAssignments[playerIndex];
            
            // If it was a gamepad, mark it as unassigned
            if (assignment.type === 'gamepad' && controllerStates[assignment.controllerIndex]) {
                controllerStates[assignment.controllerIndex].assigned = false;
            }
            
            // Reset the assignment
            playerAssignments[playerIndex] = {
                assigned: false,
                type: null,
                controllerIndex: null
            };
            
            // Restore the setup UI for this quadrant
            createQuadrantSetupUI(playerIndex);
            
            // Update controller lists
            updateAllControllerLists();
        }
        
        // Assign gamepad to next available slot
        function assignGamepadToNextSlot(controllerIndex) {
            // Find the next empty slot
            const nextSlot = playerAssignments.findIndex(a => !a.assigned);
            if (nextSlot === -1) return; // All slots filled
            
            // Mark controller as assigned
            controllerStates[controllerIndex].assigned = true;
            
            // Assign controller to slot
            playerAssignments[nextSlot] = {
                assigned: true,
                type: 'gamepad',
                controllerIndex,
                controllerId: controllerStates[controllerIndex].id,
                playerIndex: nextSlot
            };
            
            // Create the game window for this player
            createGameWindowForPlayer(nextSlot);
            
            // Update controller lists for remaining quadrants
            updateAllControllerLists();
        }
        
        // Create a game window for a specific player
        function createGameWindowForPlayer(playerIndex) {
            const assignment = playerAssignments[playerIndex];
            if (!assignment || !assignment.assigned) return;
            
            const position = getPositionName(playerIndex, playerCount);
            
            // Get the quadrant for this player
            const quadrantEl = document.getElementById(`quadrant-${playerIndex}`);
            if (!quadrantEl) return;
            
            // Clear any existing content in this quadrant
            quadrantEl.innerHTML = '';
            quadrantEl.className = 'quadrant client-box';
            quadrantEl.style.borderLeft = `4px solid ${CONTROLLER_COLORS[playerIndex]}`;
            
            // Add player info
            const playerInfo = document.createElement('div');
            playerInfo.className = 'player-info';
            playerInfo.textContent = `Player ${playerIndex + 1} (${position})`;
            quadrantEl.appendChild(playerInfo);
            
            // Add controller indicator
            const controllerIndicator = document.createElement('div');
            controllerIndicator.className = 'controller-indicator';
            controllerIndicator.textContent = assignment.type === 'keyboard' ? 
                'Keyboard/Mouse' : `Controller #${assignment.controllerIndex + 1}`;
            controllerIndicator.style.borderLeft = `4px solid ${CONTROLLER_COLORS[playerIndex]}`;
            quadrantEl.appendChild(controllerIndicator);
            
            // Add loading overlay
            const loadingOverlay = document.createElement('div');
            loadingOverlay.className = 'loading-overlay';
            loadingOverlay.id = `loading-overlay-${playerIndex}`;
            loadingOverlay.innerHTML = `
                <h3>Loading Player ${playerIndex + 1}...</h3>
                <p>Please wait</p>
            `;
            quadrantEl.appendChild(loadingOverlay);
            
            // Create iframe for game content instead of webview
            // This ensures compatibility with the browser-based game
            const iframe = document.createElement('iframe');
            
            // Build URL with all necessary parameters exactly like the single-player mode
            const gameUrl = `${serverUrl}/game?implementation=${implementation}`;
            console.log(`Creating game for Player ${playerIndex + 1} with URL: ${gameUrl}`);
            
            iframe.src = gameUrl;
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.allowFullscreen = true;
            
            // Add iframe to quadrant
            quadrantEl.appendChild(iframe);
            
            // Remove loading overlay after a short delay
            setTimeout(() => {
                const loadingOverlay = document.getElementById(`loading-overlay-${playerIndex}`);
                if (loadingOverlay) {
                    loadingOverlay.style.display = 'none';
                }
                
                // Set up controller input for this iframe if needed
                if (assignment.type === 'gamepad') {
                    setupGamepadForIframe(iframe, assignment);
                }
            }, 2000);
        }
        
        // Setup gamepad input for an iframe
        function setupGamepadForIframe(iframe, assignment) {
            // This function would need to be implemented based on how your game
            // handles gamepad input in the browser
            console.log(`Setting up gamepad ${assignment.controllerIndex} for player ${assignment.playerIndex}`);
            
            // This is a simplified version - you might need to implement
            // message passing to the iframe or other techniques depending
            // on your game's implementation
        }
        
        // Get position name based on index and player count
        function getPositionName(index, playerCount) {
            if (playerCount === 1) return "Full Screen";
            if (playerCount === 2) return index === 0 ? "Top" : "Bottom";
            
            // For 3 or 4 players
            switch(index) {
                case 0: return "Top Left";
                case 1: return "Top Right";
                case 2: return "Bottom Left";
                case 3: return "Bottom Right";
                default: return `Player ${index + 1}`;
            }
        }
        
        // Initialize the app
        initializeQuadrants();
        setupGamepadDetection();
    </script>
</body>
</html>
