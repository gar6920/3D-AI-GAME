<!DOCTYPE html>
<html>
<head>
    <title>3D AI Game - Multi-Player Setup</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .container {
            width: 100vw;
            height: 100vh;
            gap: 2px;
            background-color: #000;
            display: grid;
        }
        /* 2 players: top-bottom split */
        .players-2 {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
        }
        /* 3 players: top left, top right, bottom left */
        .players-3 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
        .players-3 iframe:last-of-type {
            grid-column: 1;
            grid-row: 2;
        }
        /* 4 players: 2x2 grid */
        .players-4 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const playerCount = parseInt(urlParams.get('players')) || 4;
            const implementation = urlParams.get('implementation');
            
            // Validate required parameters
            if (!implementation) {
                document.body.innerHTML = '<div style="text-align: center; padding: 20px;"><h1>Error</h1><p>No implementation selected. Please return to the player selection page.</p><a href="/select">Go Back</a></div>';
                return;
            }
            
            // Set container class based on player count
            const container = document.querySelector('.container');
            container.className = `container players-${playerCount}`;
            
            // Create iframes based on player count, passing implementation
            container.innerHTML = '';
            for (let i = 0; i < playerCount; i++) {
                const iframe = document.createElement('iframe');
                // Pass implementation to each game iframe
                iframe.src = `/game?implementation=${implementation}&playerName=Player${i + 1}`;
                container.appendChild(iframe);
            }

            // Fetch implementation info (using relative path) to set the title
            try {
                // Use the passed implementation for the title, or fetch if needed
                document.title = `3D AI Game - ${playerCount} Players - ${implementation.charAt(0).toUpperCase() + implementation.slice(1)}`;

                // Optional: Fetch config if you need other details, but not needed for the indicator now
                // const response = await fetch('/api/config');
                // if (response.ok) {
                //     const config = await response.json();
                     // document.title = `3D AI Game - ${playerCount} Players - ${config.activeImplementation}`; // Old way
                     
                     // REMOVED CODE TO CREATE AND APPEND #implementation-display element
                // }
            } catch (error) {
                console.error('Failed to set title based on implementation info:', error);
            }
        });
    </script>
</head>
<body>
    <div class="container">
        <!-- iframes will be added by JavaScript -->
    </div>
</body>
</html>
